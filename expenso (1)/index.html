<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenso — Enterprise Reimbursement Platform</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=General+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Tesseract.js v5 CDN — provides global Tesseract object -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <!-- ═══════════ LOGIN SCREEN ═══════════ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-ambient"></div>
    <div class="login-ambient-2"></div>
    <div class="login-card">
      <div class="login-logo">⚡</div>
      <h1 class="login-title">Expenso</h1>
      <p class="login-sub">Enterprise Reimbursement Platform</p>
      <form id="loginForm" onsubmit="return App.handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" id="loginEmail" class="form-input" placeholder="admin@company.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPass" class="form-input" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader spinner" style="display:none"></span>
        </button>
      </form>
      <div class="login-demo">
        <p class="demo-heading">Demo Credentials</p>
        <div class="demo-grid">
          <button class="demo-chip" onclick="App.fillLogin('admin@company.com','admin')">
            <span class="demo-role admin">Admin</span>
            <span>admin@company.com</span>
          </button>
          <button class="demo-chip" onclick="App.fillLogin('priya@company.com','pass')">
            <span class="demo-role manager">Manager</span>
            <span>priya@company.com</span>
          </button>
          <button class="demo-chip" onclick="App.fillLogin('raj@company.com','pass')">
            <span class="demo-role employee">Employee</span>
            <span>raj@company.com</span>
          </button>
          <button class="demo-chip" onclick="App.fillLogin('ananya@company.com','pass')">
            <span class="demo-role employee">Employee</span>
            <span>ananya@company.com</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ APP SHELL ═══════════ -->
  <div id="appShell" class="app-shell" style="display:none">
    <!-- Mobile Toggle -->
    <button class="mobile-toggle" id="mobileToggle" onclick="App.toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">Expenso</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>
  </div>

  <!-- ═══════════ MODAL ═══════════ -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)App.closeModal()">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ═══════════ TOAST CONTAINER ═══════════ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ═══════════ SCRIPTS ═══════════ -->
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
