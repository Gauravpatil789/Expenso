<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenso — Enterprise Reimbursement Platform</title>
  <meta name="description" content="Expenso is a modern enterprise reimbursement management platform with multi-level approvals, OCR receipt scanning, and real-time currency conversion.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <!-- ═══════════ AUTH SCREEN ═══════════ -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-container">
      <div class="auth-brand">
        <div class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        </div>
        <h1 class="auth-title">Expenso</h1>
        <p class="auth-subtitle">Enterprise Reimbursement Platform</p>
      </div>

      <!-- Login Form -->
      <div id="loginPanel">
        <form id="loginForm" onsubmit="return App.handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPass">Password</label>
            <input type="password" id="loginPass" class="form-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader spinner" style="display:none"></span>
          </button>
        </form>
        <div class="auth-switch">
          Don't have an account? <a href="#" onclick="App.showSignup(); return false;">Create one</a>
        </div>
        <div class="demo-section">
          <p class="demo-title">Quick Demo Access</p>
          <div class="demo-grid">
            <button class="demo-chip" onclick="App.fillLogin('admin@company.com','admin')">
              <span class="demo-role role-admin">Admin</span>admin@company.com
            </button>
            <button class="demo-chip" onclick="App.fillLogin('priya@company.com','pass')">
              <span class="demo-role role-manager">Manager</span>priya@company.com
            </button>
            <button class="demo-chip" onclick="App.fillLogin('raj@company.com','pass')">
              <span class="demo-role role-employee">Employee</span>raj@company.com
            </button>
          </div>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="signupPanel" style="display:none">
        <form id="signupForm" onsubmit="return App.handleSignup(event)">
          <div class="form-group">
            <label class="form-label" for="signupCompany">Company Name</label>
            <input type="text" id="signupCompany" class="form-input" placeholder="Acme Inc." required>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label class="form-label" for="signupCountry">Country</label>
              <select class="form-input" id="signupCountry">
                <option value="">Loading countries…</option>
              </select>
            </div>
            <div class="form-group" style="flex:0 0 100px">
              <label class="form-label" for="signupCurrency">Currency</label>
              <input class="form-input" id="signupCurrency" readonly placeholder="—">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupName">Your Name</label>
            <input type="text" id="signupName" class="form-input" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" class="form-input" placeholder="jane@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPass">Password</label>
            <input type="password" id="signupPass" class="form-input" placeholder="Choose a password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader spinner" style="display:none"></span>
          </button>
        </form>
        <div class="auth-switch">
          Already have an account? <a href="#" onclick="App.showLogin(); return false;">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ APP SHELL ═══════════ -->
  <div id="appShell" class="app-shell" style="display:none">
    <button class="mobile-toggle" id="mobileToggle" onclick="App.toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span class="brand-text">Expenso</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>

    <main class="main-content" id="mainContent"></main>
  </div>

  <!-- ═══════════ MODAL ═══════════ -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)App.closeModal()">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ═══════════ TOAST ═══════════ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ═══════════ SCRIPTS ═══════════ -->
  <script src="js/api.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/components.js"></script>
  <script src="js/store.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
